[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://telegram.org https://oauth.telegram.org https://dulcet-yeot-cb2d95.netlify.app; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://t.me https://firebasestorage.googleapis.com; connect-src 'self' https://firestore.googleapis.com https://*.googleapis.com; frame-src 'self' https://oauth.telegram.org;"
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # These variables are required for both the client and server code.
  REACT_APP_FIREBASE_API_KEY = ""
  REACT_APP_FIREBASE_AUTH_DOMAIN = ""
  REACT_APP_FIREBASE_PROJECT_ID = ""
  REACT_APP_FIREBASE_STORAGE_BUCKET = ""
  REACT_APP_FIREBASE_MESSAGING_SENDER_ID = ""
  REACT_APP_FIREBASE_APP_ID = ""
  REACT_APP_FIREBASE_MEASUREMENT_ID = ""
  TELEGRAM_BOT_TOKEN = ""
  FIREBASE_CREDENTIALS = ""
